name: DailyGratitude
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    ENABLE_PREVIEWS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  DailyGratitude:
    type: application
    platform: iOS
    sources:
      - path: DailyGratitude
        excludes:
          - "**/.DS_Store"
    resources:
      - path: DailyGratitude/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: DailyGratitude/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.DailyGratitude
        PRODUCT_NAME: DailyGratitude
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: DailyGratitude/DailyGratitude.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGNING_ALLOWED: YES
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: DailyGratitude/DailyGratitude.entitlements
    dependencies:
      - target: DailyGratitudeWidget
        embed: true

  DailyGratitudeWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DailyGratitudeWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DailyGratitudeWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.DailyGratitude.widget
        PRODUCT_NAME: DailyGratitudeWidget
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: DailyGratitudeWidget/DailyGratitudeWidget.entitlements
        CODE_SIGNING_ALLOWED: YES
        DEVELOPMENT_TEAM: 9L6N2ZF26B
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@executable_path/../../Frameworks"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: DailyGratitudeWidget/DailyGratitudeWidget.entitlements

  DailyGratitudeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyGratitudeTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DailyGratitude
    settings:
      base:
        INFOPLIST_FILE: DailyGratitudeTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.DailyGratitudeTests
        PRODUCT_NAME: DailyGratitudeTests
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DailyGratitude.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DailyGratitude"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

  DailyGratitudeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DailyGratitudeUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DailyGratitude
    settings:
      base:
        INFOPLIST_FILE: DailyGratitudeUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.DailyGratitudeUITests
        PRODUCT_NAME: DailyGratitudeUITests
        GENERATE_INFOPLIST_FILE: NO
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/DailyGratitude.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DailyGratitude"
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

schemes:
  DailyGratitude:
    build:
      targets:
        DailyGratitude: all
        DailyGratitudeWidget: all
        DailyGratitudeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DailyGratitudeUITests
    archive:
      config: Release
